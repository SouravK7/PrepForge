embedding:
  model_name: "all-MiniLM-L6-v2"
  device: "cpu"
  batch_size: 32
  cache_enabled: true

spacy:
  model_name: "en_core_web_sm"

nltk:
  required_packages:
    - "punkt"
    - "stopwords"
    - "wordnet"
    - "averaged_perceptron_tagger"
    - "vader_lexicon"

llm:
  enabled: false
  provider: "openai"
  model_name: "gpt-3.5-turbo"
  max_tokens: 500
  temperature: 0.3
