# Success criteria for benchmark validation.
# The evaluation pipeline must meet these thresholds before
# advancing to Phase 6 (Skill Graph and Adaptive Engine).

evaluator:
  concept_evaluator_pearson_r_min: 0.80
  full_ensemble_pearson_r_min: 0.85
  full_ensemble_mae_max: 12.0

resume:
  skill_extraction_accuracy_min: 0.80

adaptive_engine:
  convergence_sessions_max: 5

api:
  response_time_ms_without_llm: 500
  response_time_ms_with_llm: 2000

ablation_experiments:
  - name: "semantic_only"
    evaluators: ["semantic"]
  - name: "semantic_concept"
    evaluators: ["semantic", "concept"]
  - name: "semantic_concept_evidence"
    evaluators: ["semantic", "concept", "evidence"]
  - name: "semantic_concept_evidence_communication"
    evaluators: ["semantic", "concept", "evidence", "communication"]
  - name: "full_ensemble"
    evaluators: ["semantic", "concept", "evidence", "communication", "reasoning"]
